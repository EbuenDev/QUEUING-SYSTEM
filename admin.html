<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RHU II Admin Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <img class="header-logo" src="src/images/logo.png" alt="RHU II Logo" />
        <div>
          <p class="eyebrow">Municipal Health Office</p>
          <h1>Rural Health Unit II</h1>
          <p>Sana wag na sila mag away.</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="logout-btn" class="nav-link logout-btn" type="button" hidden>Log out</button>
        <a class="nav-link" href="index.html">Patient Display</a>
        <a class="nav-link" href="bhw.html">BHW Panel</a>
      </div>
    </header>

    <main class="board admin-board">
      <section id="login-card" class="card auth-card">
        <h2>Admin Login</h2>
        <p class="muted">Sign in to manage the queue.</p>
        <form id="admin-login-form" class="auth-form">
          <input id="admin-username" name="username" type="text" placeholder="Username" autocomplete="username" required />
          <input id="admin-password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
          <button type="submit" class="btn btn-primary">Log In</button>
        </form>
        <p id="login-error" class="auth-error" role="alert"></p>
      </section>

      <section id="admin-panel" class="card full-width" hidden>
        <form id="patient-form" class="patient-form">
          <input id="patient-name" name="name" type="text" placeholder="Patient name" required />
          <input
            id="patient-number"
            name="patientNumber"
            type="text"
            inputmode="numeric"
            pattern="[0-9]{1,12}"
            maxlength="12"
            placeholder="Patient number"
            required
          />
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="admin-patient-type" value="regular" checked />
              Regular
            </label>
            <label class="radio-option">
              <input type="radio" name="admin-patient-type" value="pwd" />
              PWD
            </label>
            <label class="radio-option">
              <input type="radio" name="admin-patient-type" value="senior" />
              Senior Citizen
            </label>
          </div>
          <button type="submit" class="btn btn-primary">Add Patient</button>
        </form>

        <div class="toolbar">
          <button id="serve-next-btn" class="btn btn-primary">Serve Next</button>
          <button id="reset-btn" class="btn btn-secondary">Reset Queue</button>
        </div>

        <div class="section-header">
          <h2>Patient List</h2>
          <span id="admin-count" class="pill">0 patients</span>
        </div>
        <ul id="patient-list" class="queue-list admin-list"></ul>
      </section>
    </main>

    <footer class="site-credit">Developed by Mark Ian C. Ebuen</footer>

    <script src="src/js/shared.js"></script>
    <script src="src/js/admin.js"></script>
  </body>
</html>
