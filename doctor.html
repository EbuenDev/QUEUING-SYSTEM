<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RHU II Doctor Panel</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
    <div class="topbar-left">
    <img class="header-logo" src="src/images/logo.png" alt="RHU II Logo" />
    <div>
        <p class="eyebrow">Municipal Health Office</p>
        <h1>Rural Health Unit II</h1>
        <p>Sana wag na sila mag away.</p>
    </div>
    </div>
    <a class="nav-link" href="index.html">Patient Display</a>
</header>

<main class="board admin-board">
    <section class="card full-width">
        <div class="toolbar">
            <button id="doctor-serve-next-btn" class="btn btn-primary" type="button">Serve Next</button>
        </div>

        <div class="section-header">
            <h2>Patient List</h2>
            <span id="admin-count" class="pill">0 patients</span>
        </div>
        <ul id="doctor-patient-list" class="queue-list admin-list"></ul>
        </section>
        <section class="card full-width">
            <div class="section-header">
                <h2>Consultation History</h2>
                <span id="history-count" class="pill">0 entries</span>
            </div>
            <ul id="consultation-history" class="queue-list"></ul>
        </section>
    </main>

    <footer class="site-credit">Developed by Mark Ian C. Ebuen</footer>

    <script src="app.js"></script>
</body>
</html>
