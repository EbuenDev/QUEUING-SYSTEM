<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RHU II Patient Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <img class="header-logo" src="src/images/logo.png" alt="RHU II Logo" />
        <div>
          <p class="eyebrow">Municipal Health Office</p>
          <h1>Rural Health Unit II</h1>
          <p>Please wait for your turn.</p>

        </div>
      </div>
      <div id="clock" class="clock"></div>
    </header>

    <main class="board">
      <section class="card spotlight">
        <h2 id="current-serving-heading" hidden>Currently Serving</h2>
        <div id="current-serving" class="large-number">Waiting for the first patient</div>
        <p id="current-serving-name" class="muted">No patient is being served yet.</p>
      </section>

      <section class="card">
        <h2>Next Patient</h2>
        <div id="next-patient" class="next-patient">No queue yet</div>
      </section>

      <section class="card full-width">
        <div class="section-header">
          <h2>Waiting List</h2>
          <span id="queue-count" class="pill">0 patients</span>
        </div>
        <ul id="waiting-list" class="queue-list"></ul>
      </section>
    </main>

    <footer class="site-credit">Developed by Mark Ian C. Ebuen</footer>

    <script src="src/js/shared.js"></script>
    <script src="src/js/index.js"></script>
  </body>
</html>
